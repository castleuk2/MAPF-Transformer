# Base d_model=256 configuration; approximately 8.8M total parameters.
model:
  map_size: 15
  map_latents: 16
  max_neighbors: 24
  agent_local_layers: 1
  history_frames: 8
  d_model: 256
  n_heads: 8
  temporal_layers: 8
  spatial_latent_layers: 1
  dropout: 0.1
  mlp_ratio: 4
  aux_map_reconstruction: true
  aux_map_loss_weight: 0.05
training:
  train_manifest: data/train/manifest.jsonl
  val_manifest: data/val/manifest.jsonl
  output_dir: runs/mapf_transformer_base
  batch_size: 16
  epochs: 15
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  warmup_steps: 2000
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  num_workers: 8
  device: auto
  amp: true
  log_every: 20
  validate_every: 1000
  save_every: 5000
  history_augmentation: true
  min_history_frames: 1
