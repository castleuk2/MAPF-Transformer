# Packed-cache Experiment 1: grouped/gated metadata encoder only.
model:
  map_size: 15
  map_latents: 16
  one_hop_ctg: false
  metadata_encoder: grouped
  graph_attention: false
  graph_layers: 0
  max_neighbors: 15
  history_frames: 15
  d_model: 256
  n_heads: 8
  temporal_layers: 8
  spatial_latent_layers: 1
  dropout: 0.1
  mlp_ratio: 4
  aux_map_reconstruction: true
  aux_map_loss_weight: 0.05

training:
  dataset_format: packed
  train_manifest: pogema-mapf-transformer/data/mapf_lns2_1h_packed/train/manifest.jsonl
  val_manifest: pogema-mapf-transformer/data/mapf_lns2_1h_packed/val/manifest.jsonl
  output_dir: mapf-transformer-policy/runs/packed_experiment1_grouped_metadata
  batch_size: 256
  val_batch_size: 256
  gradient_accumulation_steps: 8
  epochs: 3
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  warmup_steps: 250
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  num_workers: 12
  device: auto
  amp: true
  log_every: 20
  validate_every: 250
  save_every: 625
  history_augmentation: true
  min_history_frames: 1
  goal_wait_keep_ratio: 0.2
  max_val_samples: 65536
