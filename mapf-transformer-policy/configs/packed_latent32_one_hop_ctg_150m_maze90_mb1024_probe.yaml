# Short VRAM/throughput probe. Do not use this 20-step run as a trained model.
# If micro-batch 1024 is stable, create the final schedule from its measured
# peak VRAM and samples/s.
model:
  map_size: 15
  map_latents: 32
  one_hop_ctg: true
  max_neighbors: 15
  history_frames: 15
  d_model: 256
  n_heads: 8
  temporal_layers: 8
  spatial_latent_layers: 1
  dropout: 0.1
  mlp_ratio: 4
  aux_map_reconstruction: true
  aux_map_loss_weight: 0.05

training:
  dataset_format: packed
  train_manifest: pogema-mapf-transformer/data/mapf_lns2_150m_expansion_packed_one_hop_ctg/train/manifest.jsonl
  val_manifest: pogema-mapf-transformer/data/mapf_lns2_150m_expansion_packed_one_hop_ctg/val/manifest.jsonl
  output_dir: mapf-transformer-policy/runs/packed_latent32_one_hop_ctg_150m_maze90_mb1024_probe
  batch_size: 1024
  val_batch_size: 256
  gradient_accumulation_steps: 2
  epochs: 1
  max_steps: 20
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  warmup_steps: 20
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  num_workers: 12
  device: auto
  amp: true
  log_every: 1
  validate_every: 20
  save_every: 20
  history_augmentation: true
  min_history_frames: 1
  goal_wait_keep_ratio: 0.2
  train_maze_ratio: 0.9
  max_val_samples: 4096
