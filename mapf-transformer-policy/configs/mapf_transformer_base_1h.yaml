# The model section is identical to mapf_transformer_base.yaml (8.81M parameters).
model:
  map_size: 15
  map_latents: 16
  max_neighbors: 24
  agent_latents: 32
  agent_local_layers: 1
  agent_set_layers: 1
  history_frames: 8
  d_model: 256
  n_heads: 8
  temporal_layers: 8
  spatial_latent_layers: 1
  dropout: 0.1
  mlp_ratio: 4
  aux_map_reconstruction: true
  aux_map_loss_weight: 0.05

training:
  # Paths are relative to the workspace root used by the torchrun commands.
  train_manifest: pogema-mapf-transformer/data/mapf_lns2_1h/train_manifest.jsonl
  val_manifest: pogema-mapf-transformer/data/mapf_lns2_1h/val_manifest.jsonl
  output_dir: mapf-transformer-policy/runs/mapf_lns2_1h

  # Effective global batch remains 16 * 16 = 256 on either one or two GPUs.
  # Under DDP, accumulation is divided across participating processes.
  batch_size: 16
  gradient_accumulation_steps: 16
  epochs: 3
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  warmup_steps: 2000
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  num_workers: 8
  device: auto
  amp: true
  log_every: 20
  validate_every: 1000
  save_every: 5000
  history_augmentation: true
  min_history_frames: 1
