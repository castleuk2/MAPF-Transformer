model:
  map_size: 15
  map_latents: 8
  max_neighbors: 15
  history_frames: 15
  d_model: 64
  n_heads: 4
  temporal_layers: 2
  spatial_latent_layers: 1
  dropout: 0.0
  mlp_ratio: 2
  aux_map_reconstruction: true
  aux_map_loss_weight: 0.05
training:
  train_manifest: data/synthetic/manifest.jsonl
  val_manifest: null
  output_dir: runs/tiny
  batch_size: 2
  epochs: 1
  max_steps: 20
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  warmup_steps: 2
  num_workers: 0
  device: auto
  amp: false
  log_every: 1
  validate_every: 20
  save_every: 20
  history_augmentation: true
  min_history_frames: 1
